version: "3.8"

# OpenClaw MBC — Docker Swarm stack
# Deploy: docker stack deploy -c deploy/openclaw-mbc/docker-stack.yml openclaw-mbc
# Workspace: /root/.openclaw/workspace/openclaw-mbc

services:

  # ── UI (Nginx - static SPA) ──────────────────────────────────────────────
  mbc_ui:
    image: nginx:alpine
    volumes:
      - /root/.openclaw/workspace/openclaw-mbc/deploy/openclaw-mbc/nginx-mbc-ui.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/.openclaw/workspace/openclaw-mbc/dist:/usr/share/nginx/html:ro
    networks:
      - Portn8n
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.3'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 16M
      labels:
        - traefik.enable=true
        # ── Main route: /mbc/ → UI ──
        - traefik.http.routers.mbc-ui.rule=Host(`${MBC_HOST}`) && (PathPrefix(`/mbc`) || PathPrefix(`/mbc/`))
        - traefik.http.routers.mbc-ui.entrypoints=websecure
        - traefik.http.routers.mbc-ui.tls=true
        - traefik.http.routers.mbc-ui.tls.certresolver=letsencryptresolver
        - traefik.http.routers.mbc-ui.middlewares=mbc-slash,mbc-strip
        - traefik.http.routers.mbc-ui.priority=60
        # ── Middlewares ──
        - traefik.http.middlewares.mbc-slash.redirectregex.regex=^https?://([^/]+)/mbc$$
        - traefik.http.middlewares.mbc-slash.redirectregex.replacement=https://$$1/mbc/
        - traefik.http.middlewares.mbc-slash.redirectregex.permanent=true
        - traefik.http.middlewares.mbc-strip.stripprefix.prefixes=/mbc
        # ── Service port ──
        - traefik.http.services.mbc-ui.loadbalancer.server.port=80

  # ── OpenClaw MBC Engine (bot logic, scoring, state machine, WhatsApp) ────
  mbc_engine:
    image: node:22-alpine
    command: ["node", "/app/deploy/openclaw-mbc/webhook-relay.mjs"]
    working_dir: /app
    environment:
      - PORT=3020
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
      - WHATSAPP_INSTANCE=${WHATSAPP_INSTANCE:-mbc}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ORBIT_CORE_URL=${ORBIT_CORE_URL:-http://orbitcore_api:3010}
      - ORBIT_API_KEY=${ORBIT_API_KEY}
      - NODE_ENV=production
    volumes:
      - /root/.openclaw/workspace/openclaw-mbc:/app:ro
    networks:
      - Portn8n
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3020/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
      labels:
        - traefik.enable=true
        - traefik.http.routers.mbc-webhook.rule=Host(`${MBC_HOST}`) && PathPrefix(`/mbc/api/webhook`)
        - traefik.http.routers.mbc-webhook.entrypoints=websecure
        - traefik.http.routers.mbc-webhook.tls=true
        - traefik.http.routers.mbc-webhook.tls.certresolver=letsencryptresolver
        - traefik.http.routers.mbc-webhook.middlewares=mbc-api-strip
        - traefik.http.routers.mbc-webhook.priority=70
        - traefik.http.middlewares.mbc-api-strip.stripprefix.prefixes=/mbc
        - traefik.http.services.mbc-webhook.loadbalancer.server.port=3020

networks:
  Portn8n:
    external: true
    name: Portn8n
